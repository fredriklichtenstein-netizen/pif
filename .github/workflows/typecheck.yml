name: Typecheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: |
            .tsbuildinfo
            node_modules/.cache/tsc
          key: ${{ runner.os }}-tsc-${{ hashFiles('tsconfig*.json', 'src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-tsc-

      - name: Cache Vite build artifacts
        id: vite_cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            .vite
            dist
          key: ${{ runner.os }}-vite-${{ hashFiles('vite.config.ts', 'bun.lockb', 'bun.lock') }}-${{ hashFiles('src/**/*', 'index.html', 'tailwind.config.ts', 'postcss.config.js') }}
          restore-keys: |
            ${{ runner.os }}-vite-${{ hashFiles('vite.config.ts', 'bun.lockb', 'bun.lock') }}-
            ${{ runner.os }}-vite-

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: ${{ runner.os }}-eslint-${{ hashFiles('eslint.config.js') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-eslint-${{ hashFiles('eslint.config.js') }}-
            ${{ runner.os }}-eslint-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bunx tsc --noEmit

      - name: ESLint
        run: bun run lint

      - name: Vite production build
        run: bun run build

      - name: Prime Vite dep cache
        run: bunx vite optimize

